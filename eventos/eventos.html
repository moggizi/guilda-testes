<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
    <script src="/theme.js"></script>
    <script src="/app-loader.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recrutamentos</title>
  <script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .dd { position: relative; }
    .dd-btn { width:100%; display:flex; align-items:center; justify-content:space-between; gap:.75rem;
      border:1px solid rgba(15,23,42,.12); background:#fff; border-radius:1rem; padding:.82rem 1rem;
      box-shadow: 0 1px 2px rgba(2,6,23,.04); outline:none; }
    .dd-btn:focus { box-shadow: 0 0 0 4px rgba(16,185,129,.18); border-color: rgba(16,185,129,.55); }
    .dd-menu { position:absolute; left:0; right:0; top: calc(100% + .5rem); background:#ffffff; color:#0f172a;
      border:1px solid rgba(15,23,42,.12); border-radius: 1rem; overflow:hidden; z-index:40;
      box-shadow: 0 20px 60px rgba(2,6,23,.18); max-height: 360px; overflow-y:auto; }
    .dd-item { width:100%; text-align:left; padding:.7rem 1rem; font-size:.875rem; display:flex; align-items:center; gap:.6rem; }
    .dd-item:hover { background: rgba(15,23,42,.06); }
    .dd-item[aria-selected="true"] { background: rgba(16,185,129,.16); color:#065f46; font-weight:800; }
    .select-chip input { display:none; }
    .select-chip span { display:inline-flex; align-items:center; gap:.45rem; border-radius:9999px; border:1px solid rgb(226 232 240); background:white; color:#334155; padding:.62rem .9rem; font-size:.875rem; font-weight:700; cursor:pointer; }
    .select-chip input:checked + span { background:#ecfdf5; color:#047857; border-color:#a7f3d0; }
    .rq-select-wrap { position:relative; }
    .rq-select {
      width:100%; appearance:none; -webkit-appearance:none; -moz-appearance:none;
      border:1px solid rgb(226 232 240); background:#fff; color:#0f172a;
      border-radius:1rem; padding:.9rem 2.9rem .9rem 1rem; font-size:.875rem; font-weight:700;
      outline:none; box-shadow:0 1px 2px rgba(2,6,23,.04);
    }
    .rq-select:focus {
      border-color: rgb(52 211 153);
      box-shadow: 0 0 0 4px rgba(16,185,129,.12);
    }
    .rq-select-wrap i {
      position:absolute; right:1rem; top:50%; transform:translateY(-50%);
      width:1rem; height:1rem; color:#64748b; pointer-events:none;
    }
    .rq-dd { position:relative; }
    .rq-dd-native { position:absolute !important; opacity:0 !important; pointer-events:none !important; width:0 !important; height:0 !important; }
    .rq-dd-btn {
      width:100%; display:flex; align-items:center; justify-content:space-between; gap:.75rem;
      border:1px solid rgb(226 232 240); background:#fff; color:#0f172a;
      border-radius:1rem; padding:.9rem 1rem; font-size:.875rem; font-weight:700;
      box-shadow:0 1px 2px rgba(2,6,23,.04); outline:none; transition:all .18s ease;
    }
    .rq-dd-btn:hover { border-color: rgb(203 213 225); background:#f8fafc; }
    .rq-dd-btn.is-open, .rq-dd-btn:focus {
      border-color: rgb(52 211 153);
      box-shadow: 0 0 0 4px rgba(16,185,129,.12);
      background:#fff;
    }
    .rq-dd-btn .rq-dd-label { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .rq-dd-btn .rq-dd-arrow { flex:0 0 auto; color:#64748b; transition:transform .18s ease; }
    .rq-dd-btn.is-open .rq-dd-arrow { transform:rotate(180deg); }
    .rq-dd-menu {
      position:absolute; left:0; right:0; top:calc(100% + .5rem); z-index:120;
      background:#fff; border:1px solid rgba(15,23,42,.12); border-radius:1rem;
      box-shadow:0 20px 60px rgba(2,6,23,.18); max-height:240px; overflow-y:auto; padding:.35rem;
    }
    .rq-dd-item {
      width:100%; text-align:left; display:flex; align-items:center; gap:.6rem;
      border-radius:.85rem; padding:.75rem .85rem; font-size:.875rem; font-weight:700; color:#334155;
      transition:all .15s ease;
    }
    .rq-dd-item:hover { background:#f8fafc; }
    .rq-dd-item.is-selected { background:#ecfdf5; color:#047857; }
  </style>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="min-h-screen bg-white text-slate-900">
  <div id="app-boot-loader" class="app-boot-loader" role="status" aria-live="polite">
    <div class="app-boot-loader__box">
      <div class="app-boot-loader__mark"></div>
      <div class="app-boot-loader__text">Carregando</div>
    </div>
  </div>
  <div id="sidebar-overlay" class="fixed inset-0 z-40 hidden bg-black/40"></div>
  <aside id="sidebar" class="fixed left-0 top-0 z-50 h-full w-[280px] -translate-x-full bg-white backdrop-blur border-r border-slate-200 transition-transform">
    <div class="p-4 border-b border-slate-200 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <img src="/assets/logo.png" alt="Logo" class="app-logo app-logo--nav">
        <div class="leading-tight">
          <div class="text-slate-900 font-black">Guilda • HUB</div>
          <div class="text-xs text-slate-500">Recrutamento • Guildas</div>
        </div>
      </div>
      <button id="sidebar-close" class="h-10 w-10 grid place-items-center rounded-xl hover:bg-slate-100">
        <i data-lucide="x" class="h-5 w-5 text-slate-700"></i>
      </button>
    </div>

    <nav class="p-3 space-y-1">
      <a href="/" class="flex items-center gap-3 px-3 py-2 rounded-xl text-slate-700 hover:bg-slate-100">
        <i data-lucide="home" class="h-4 w-4"></i>
        <span class="font-semibold">Início</span>
      </a>
      <a href="/recrutamento" class="flex items-center gap-3 px-3 py-2 rounded-xl bg-emerald-50 text-emerald-700">
        <i data-lucide="users-round" class="h-4 w-4"></i>
        <span class="font-semibold">Recrutamentos</span>
      </a>
      <a href="/suporte" class="flex items-center gap-3 px-3 py-2 rounded-xl text-slate-700 hover:bg-slate-100">
        <i data-lucide="help-circle" class="h-4 w-4"></i>
        <span class="font-semibold">Suporte</span>
      </a>
    </nav>

    <div class="mt-auto p-4 text-xs text-slate-500 border-t border-slate-200">
      <div class="leading-relaxed">Encontre guildas abertas para recrutamento e envie seu pedido direto pela plataforma.</div>
    </div>
  </aside>

  <header class="sticky top-0 z-30 bg-white/80 backdrop-blur border-b border-slate-200">
<div class="mx-auto w-full max-w-6xl px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button id="sidebar-open" class="h-10 w-10 grid place-items-center rounded-xl bg-white ring-1 ring-slate-200 text-slate-900 shadow-sm hover:bg-slate-50">
          <i data-lucide="menu" class="h-5 w-5 text-slate-900"></i>
        </button>
        <div class="leading-tight">
          <div class="font-black text-slate-900">Guilda • HUB</div>
          <div class="text-xs text-slate-500">Recrutamento • Guildas</div>
        </div>
      </div>
      <a href="/" class="text-sm font-semibold text-emerald-700 hover:text-emerald-800">Voltar</a>
    </div>
  </header>

  <main class="mx-auto w-full max-w-6xl px-4 py-6">
    <section class="space-y-5">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
        <div class="flex-1">
          <label class="text-xs text-slate-500">Pesquisar</label>
          <input id="q" type="text" placeholder="Ex: nome da guilda, descrição, rush, honras..."
            class="mt-1 w-full rounded-2xl bg-white ring-1 ring-slate-200 px-4 py-3 text-sm outline-none focus:ring-emerald-400/40" />
        </div>
        <div class="w-full sm:w-[300px]">
          <label class="text-xs text-slate-500">Filtro</label>
          <div class="relative mt-1">
            <input type="hidden" id="filter" value="all" />
            <div class="dd">
              <button type="button" id="filterBtn" class="dd-btn">
                <span id="filterLabel" class="font-semibold text-slate-900">Todos</span>
                <i data-lucide="chevron-down" class="h-4 w-4 text-slate-600"></i>
              </button>
              <div id="filterMenu" class="dd-menu hidden">
                <button type="button" class="dd-item" data-value="all" aria-selected="true"><i data-lucide="layers" class="h-4 w-4"></i>Todos</button>
                <button type="button" class="dd-item" data-value="masculina"><i data-lucide="shield" class="h-4 w-4"></i>Guilda masculina</button>
                <button type="button" class="dd-item" data-value="feminina"><i data-lucide="heart" class="h-4 w-4"></i>Guilda feminina</button>
                <button type="button" class="dd-item" data-value="mista"><i data-lucide="users" class="h-4 w-4"></i>Guilda mista</button>
                <button type="button" class="dd-item" data-value="gg"><i data-lucide="swords" class="h-4 w-4"></i>Foco em GG</button>
                <button type="button" class="dd-item" data-value="honras"><i data-lucide="award" class="h-4 w-4"></i>Foco em honras</button>
                <button type="button" class="dd-item" data-value="todos"><i data-lucide="target" class="h-4 w-4"></i>Foco em todos</button>
                <button type="button" class="dd-item" data-value="rush"><i data-lucide="zap" class="h-4 w-4"></i>Rush</button>
                <button type="button" class="dd-item" data-value="fuzileiro"><i data-lucide="crosshair" class="h-4 w-4"></i>Fuzileiro</button>
                <button type="button" class="dd-item" data-value="full gás"><i data-lucide="flame" class="h-4 w-4"></i>Full Gás</button>
                <button type="button" class="dd-item" data-value="curandeiro"><i data-lucide="plus-circle" class="h-4 w-4"></i>Curandeiro</button>
                <button type="button" class="dd-item" data-value="suporte"><i data-lucide="life-buoy" class="h-4 w-4"></i>Suporte</button>
                <button type="button" class="dd-item" data-value="discord"><i data-lucide="messages-square" class="h-4 w-4"></i>Discord</button>
                <button type="button" class="dd-item" data-value="whatsapp"><i data-lucide="message-circle" class="h-4 w-4"></i>WhatsApp</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="status" class="text-sm text-slate-500"></div>
      <div id="grid" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
    </section>
  </main>

  <div id="request-modal" class="fixed inset-0 z-[80] hidden items-center justify-center overflow-y-auto p-4">
    <div data-close-request data-close-marketplace-request class="absolute inset-0 bg-slate-950/55"></div>
    <div class="relative z-10 my-auto w-full max-w-lg max-h-[calc(100dvh-2rem)] rounded-3xl border border-slate-200 bg-white shadow-2xl overflow-hidden flex flex-col">
        <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
          <div>
            <p class="text-xs font-semibold uppercase tracking-wide text-emerald-700">Enviar pedido</p>
            <h3 class="text-lg font-black text-slate-900" id="request-modal-guild">Guilda</h3>
          </div>
          <button type="button" data-close-request data-close-marketplace-request class="grid h-10 w-10 place-items-center rounded-2xl hover:bg-slate-100">
            <i data-lucide="x" class="h-5 w-5 text-slate-700"></i>
          </button>
        </div>
        <form id="request-form" class="space-y-4 p-5 overflow-y-auto overscroll-contain min-h-0">
          <p id="request-helper" class="text-sm text-slate-500">Preencha seus dados para enviar o pedido.</p>
          <div>
            <label class="text-xs font-semibold text-slate-500">Seu ID</label>
            <input id="applicant-id" type="text" inputmode="numeric" placeholder="Somente números" class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-emerald-400 focus:ring-4 focus:ring-emerald-100" />
          </div>
          <div>
            <label class="text-xs font-semibold text-slate-500">Seu nick</label>
            <input id="applicant-nick" type="text" maxlength="30" placeholder="Digite seu nick" class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-emerald-400 focus:ring-4 focus:ring-emerald-100" />
          </div>
          <div>
            <label class="text-xs font-semibold text-slate-500">WhatsApp</label>
            <div class="mt-1 grid grid-cols-[132px_minmax(0,1fr)] gap-2">
              <select id="applicant-whatsapp-ddi" class="rounded-2xl border border-slate-200 bg-white px-3 py-3 text-sm font-semibold outline-none focus:border-emerald-400 focus:ring-4 focus:ring-emerald-100">
                <option value="55" selected>🇧🇷 +55</option>
                <option value="1">🇺🇸 +1</option>
                <option value="54">🇦🇷 +54</option>
                <option value="351">🇵🇹 +351</option>
                <option value="52">🇲🇽 +52</option>
                <option value="595">🇵🇾 +595</option>
                <option value="56">🇨🇱 +56</option>
                <option value="57">🇨🇴 +57</option>
                <option value="51">🇵🇪 +51</option>
              </select>
              <input id="applicant-whatsapp" type="text" inputmode="numeric" placeholder="DDD + número" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-emerald-400 focus:ring-4 focus:ring-emerald-100" />
            </div>
          </div>
          <div>
            <label class="text-xs font-semibold text-slate-500">Qual modo você joga?</label>
            <div id="request-modes" class="mt-2 grid grid-cols-2 gap-2"></div>
          </div>
          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label class="text-xs font-semibold text-slate-500">Idade</label>
              <div class="rq-select-wrap mt-1">
                <select id="applicant-age" class="rq-select" data-marketplace-custom-select="true">
                  <option value="">Selecione sua idade</option>
                  <option value="+10">+10</option>
                  <option value="+11">+11</option>
                  <option value="+12">+12</option>
                  <option value="+13">+13</option>
                  <option value="+14">+14</option>
                  <option value="+15">+15</option>
                  <option value="+16">+16</option>
                  <option value="+17">+17</option>
                  <option value="+18">+18</option>
                </select>
                <i data-lucide="chevron-down"></i>
              </div>
            </div>
            <div>
              <label class="text-xs font-semibold text-slate-500">Horário disponível</label>
              <div class="rq-select-wrap mt-1">
                <select id="applicant-availability" class="rq-select" data-marketplace-custom-select="true">
                  <option value="">Selecione um horário</option>
                  <option value="Manhã">Manhã</option>
                  <option value="Tarde">Tarde</option>
                  <option value="Noite">Noite</option>
                </select>
                <i data-lucide="chevron-down"></i>
              </div>
            </div>
            <div>
              <label class="text-xs font-semibold text-slate-500">Disponível sexta e sábado?</label>
              <div class="rq-select-wrap mt-1">
                <select id="applicant-weekend" class="rq-select" data-marketplace-custom-select="true">
                  <option value="">Selecione</option>
                  <option value="Sim">Sim</option>
                  <option value="Não">Não</option>
                </select>
                <i data-lucide="chevron-down"></i>
              </div>
            </div>
            <div>
              <label class="text-xs font-semibold text-slate-500">Já jogou GG?</label>
              <div class="rq-select-wrap mt-1">
                <select id="applicant-gg" class="rq-select" data-marketplace-custom-select="true">
                  <option value="">Selecione</option>
                  <option value="Sim">Sim</option>
                  <option value="Não">Não</option>
                </select>
                <i data-lucide="chevron-down"></i>
              </div>
            </div>
            <div class="sm:col-span-2">
              <label class="text-xs font-semibold text-slate-500">Possui troca nick?</label>
              <div class="rq-select-wrap mt-1">
                <select id="applicant-nick-change" class="rq-select" data-marketplace-custom-select="true">
                  <option value="">Selecione</option>
                  <option value="Sim">Sim</option>
                  <option value="Não">Não</option>
                </select>
                <i data-lucide="chevron-down"></i>
              </div>
            </div>
          </div>
          <button id="btn-send-request" type="submit" class="inline-flex w-full items-center justify-center gap-2 rounded-2xl bg-slate-900 px-4 py-3 text-sm font-extrabold text-white hover:bg-slate-800">
            <i data-lucide="send" class="h-4 w-4"></i>
            Enviar pedido
          </button>
        </form>
      </div>
    </div>
  </div>
<script type="module" src="/eventos/eventos.js"></script>
</body>
</html>
