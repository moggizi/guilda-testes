<link rel="stylesheet" href="../style.css" />
</head>
<body class="bg-gray-50/80">

  <div class="flex min-h-screen">
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/30 z-40 hidden lg:hidden"></div>

    <aside id="sidebar" class="fixed top-0 left-0 h-screen w-72 bg-white border-r border-gray-200 z-50 transform -translate-x-full transition-transform duration-300 lg:translate-x-0 flex flex-col">
  <div class="flex items-center justify-between p-5 border-b border-gray-100 shrink-0">
    <div class="flex items-center gap-3">
      <img src="/assets/logo.png" alt="Logo" class="app-logo app-logo--nav">
      <div>
        <h1 class="font-bold text-gray-900 text-lg">Guilda e eventos</h1>
        <p class="text-xs text-gray-400">Menu</p>
      </div>
    </div>
  </div>

  <nav class="p-4 space-y-1 flex-1 overflow-y-auto">
    <a href="../dashboard/dashboard.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors">
      <i data-lucide="house" class="w-5 h-5"></i> Painel
    </a>

    <a href="../membros/membros.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors">
      <i data-lucide="users" class="w-5 h-5"></i> Membros
    </a>

    <a href="../lines/lines.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium bg-emerald-50 text-emerald-700 shadow-sm">
      <i data-lucide="layers" class="w-5 h-5"></i> Lines / Equipe
    </a>

    <a href="../ajustes/ajustes.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors">
      <i data-lucide="settings-2" class="w-5 h-5"></i> Ajustes
    </a>

    <a href="../upgrade/upgrade.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors">
      <i data-lucide="sparkles" class="w-5 h-5"></i> Assinatura
    </a>

    <a href="../recrutar/recrutar.html" class="only-leader w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors">
      <i data-lucide="users-round" class="w-5 h-5"></i> Recrutamento
    </a>

    <a href="../admin/admin.html" class="only-leader w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors">
      <i data-lucide="settings" class="w-5 h-5"></i> Admin
    </a>

     <a id="nav-support-link" href="https://chat.whatsapp.com/FsBRk3VNaGm29UmXldwaOE?mode=hq2tcli" target="_blank" rel="noopener noreferrer" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors">
      <i data-lucide="messages-square" class="w-5 h-5"></i> Suporte &amp; Sugestão
    </a>

    <a id="nav-chefe" href="../chefe/chefe.html" class="hidden w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-colors">
      <i data-lucide="crown" class="w-5 h-5"></i> Chefe
    </a>
  </nav>

  <div class="shrink-0 p-4 border-t border-gray-100 bg-white">
    <a href="../perfil/perfil.html" class="flex items-center justify-between px-3 py-2 rounded-xl bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200/50 hover:bg-emerald-100 transition-colors">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-emerald-200/50 flex items-center justify-center text-emerald-800 font-bold text-sm overflow-hidden border border-emerald-300">
          <img id="sidebar-avatar" src="" alt="" class="w-full h-full object-cover hidden">
          <i id="sidebar-avatar-icon" data-lucide="user" class="w-4 h-4"></i>
        </div>

        <div>
          <p id="user-role" class="text-sm font-bold">Meu Perfil</p>
          <p id="user-email" class="text-[10px] opacity-80 truncate w-28">Configurações</p>
        </div>
      </div>
    </a>

    <button id="btn-logout" class="w-full mt-2 flex items-center justify-center gap-2 py-2 text-sm font-semibold text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors">
      <i data-lucide="log-out" class="w-4 h-4"></i> Sair
    </button>
  </div>
</aside>

<main class="flex-1 min-w-0 lg:ml-72">
      <header class="sticky top-0 z-30 bg-white/70 backdrop-blur border-b border-gray-100">
<div class="max-w-5xl mx-auto px-4 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
          <div class="flex items-center gap-3 w-full sm:w-auto">
            <button id="mobile-menu-btn" class="lg:hidden p-2 rounded-xl hover:bg-gray-100 text-gray-500">
              <i data-lucide="menu" class="w-5 h-5 text-gray-700"></i>
            </button>
            <div class="min-w-0">
              <h2 class="text-lg font-extrabold text-gray-900 flex items-center gap-2">Lines <span id="plus-badge-lines" class="hidden inline-flex items-center rounded-full bg-purple-50 text-purple-700 ring-1 ring-purple-200 px-2 py-0.5 text-[10px] font-extrabold">PLUS</span></h2>
              <p class="text-gray-500 text-sm mt-1 whitespace-nowrap" id="lines-count">Carregando...</p>
            </div>
          </div>

          <div class="flex flex-wrap items-center justify-end gap-2 w-full sm:w-auto">
            <div id="sort-picker-wrap" class="relative w-44 max-w-full sm:w-auto sm:min-w-[220px]">
  <button type="button" onclick="toggleSortPickerMenu()" class="w-full px-4 py-2.5 rounded-xl border border-emerald-100 bg-white text-left text-sm font-medium text-gray-700 shadow-sm outline-none hover:border-emerald-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 transition-all">
    <span class="flex items-center justify-between gap-3">
      <span id="sort-picker-label" class="truncate">Todos (GG + honra)</span>
      <span id="sort-picker-caret" class="text-gray-400 text-xs">▾</span>
    </span>
  </button>

  <div id="sort-picker-menu" class="hidden absolute right-0 top-[calc(100%+8px)] w-full z-40 overflow-hidden rounded-2xl border border-emerald-100 bg-white shadow-2xl shadow-emerald-100/30">
    <div class="p-2 space-y-1">
      <button type="button" onclick="pickSortOption('all', 'Todos (GG + honra)')" class="w-full px-3 py-2 text-left text-sm font-semibold bg-emerald-50 text-emerald-700 rounded-xl hover:bg-emerald-50 hover:text-emerald-700 transition-colors">Todos (GG + honra)</button>
      <button type="button" onclick="pickSortOption('gg', 'Pontos GG')" class="w-full px-3 py-2 text-left text-sm font-semibold text-gray-700 rounded-xl hover:bg-emerald-50 hover:text-emerald-700 transition-colors">Pontos GG</button>
      <button type="button" onclick="pickSortOption('honra', 'Pontos honra')" class="w-full px-3 py-2 text-left text-sm font-semibold text-gray-700 rounded-xl hover:bg-emerald-50 hover:text-emerald-700 transition-colors">Pontos honra</button>
    </div>
  </div>
</div>

            <div class="relative">
              <button id="btn-lines-guild-slot" type="button" class="flex items-center gap-2 px-3 py-2.5 bg-white border border-gray-200 text-gray-700 rounded-xl text-sm font-medium shadow-sm hover:bg-gray-50 transition-all active:scale-95" title="Guilda">
                <i data-lucide="users" class="w-4 h-4 text-emerald-500"></i>
                <span id="lines-guild-slot-label" class="hidden sm:inline">Guilda 1</span>
                <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
              </button>
              <div id="lines-guild-slot-dropdown" class="hidden absolute right-0 mt-2 w-72 bg-white rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.12)] border border-gray-100 z-50 p-3 space-y-2"></div>
            </div>

            <button id="btn-new-line" title="Recurso PLUS" onclick="openLineModal()" class="flex items-center gap-2 px-4 py-2.5 bg-gradient-to-r from-emerald-500 to-green-600 text-white rounded-xl text-sm font-medium shadow-lg shadow-emerald-200 hover:shadow-xl hover:shadow-emerald-200 transition-all active:scale-95">
              <i data-lucide="plus" class="w-4 h-4"></i> <span class="hidden sm:inline">Adicionar</span>
            </button>
          </div>
        </div>

        <div class="max-w-5xl mx-auto px-4 pb-4 flex gap-3">
          <div class="flex-1 relative">
            <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
            <input type="text" id="search-input" placeholder="Buscar por nome, nick ou ID..." class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 outline-none text-sm transition-all bg-white">
          </div>
          <button id="btn-refresh-lines" onclick="loadLines(true)" class="flex items-center gap-2 px-4 py-3 rounded-xl border border-gray-200 bg-white text-sm text-gray-600 hover:bg-gray-50 transition-colors" title="Atualizar">↻</button>
        </div>
      </header>

      <div class="max-w-5xl mx-auto px-4 py-6">
        <div id="lines-list" class="space-y-3">
          <div class="bg-white rounded-2xl border border-gray-100 p-4 animate-pulse flex items-center gap-3">
            <div class="w-11 h-11 bg-gray-200 rounded-full"></div>
            <div class="flex-1 space-y-2">
              <div class="h-4 bg-gray-200 rounded w-1/3"></div>
              <div class="h-3 bg-gray-100 rounded w-1/4"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="line-modal" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center hidden">
    <div class="fixed inset-0 bg-black/40" onclick="closeLineModal()"></div>
    <div class="relative bg-white w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl max-h-[90vh] overflow-y-auto shadow-2xl animate-in">
      <div class="sticky top-0 bg-white border-b border-gray-100 p-4 flex items-center justify-between rounded-t-2xl z-10">
        <h3 id="line-modal-title" class="text-lg font-bold text-gray-900">Nova Line</h3>
        <button onclick="closeLineModal()" class="p-2 rounded-lg hover:bg-gray-100 transition-colors">
          <i data-lucide="x" class="w-5 h-5 text-gray-500"></i>
        </button>
      </div>

      <div class="p-4 space-y-4">
        <div>
          <label class="text-xs font-bold text-gray-600 ml-1">Nome (opcional)</label>
          <input id="line-name" type="text" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none text-sm focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 transition-all" placeholder="Ex: Line Rush" />
        </div>

        <div class="bg-gray-50 rounded-2xl p-3 border border-gray-100">
          <div class="flex items-center justify-between">
            <p class="text-sm font-bold text-gray-800">Membros (máx. 10)</p>
            <span id="selected-count" class="text-xs text-gray-400">0/10</span>
          </div>

          <div id="selected-members" class="mt-3 space-y-2"></div>

          <div class="mt-3">
            <label class="text-xs font-bold text-gray-600 ml-1">Adicionar membro</label>

            <div id="member-picker-wrap" class="relative mt-1">
              <select id="member-picker" class="hidden">
                <option value="">Selecione um membro...</option>
              </select>

              <button type="button" id="member-picker-toggle" onclick="toggleMemberPickerMenu()" class="w-full px-4 py-3 rounded-xl border border-emerald-100 bg-white text-left text-sm text-gray-700 shadow-sm outline-none hover:border-emerald-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 transition-all">
                <span class="flex items-center justify-between gap-3">
                  <span id="member-picker-label" class="truncate">Selecione um membro...</span>
                  <span id="member-picker-caret" class="text-gray-400 text-xs">▾</span>
                </span>
              </button>

              <div id="member-picker-menu" class="hidden absolute left-0 right-0 top-[calc(100%+8px)] z-20 overflow-hidden rounded-2xl border border-emerald-100 bg-white shadow-2xl shadow-emerald-100/30">
                <div id="member-picker-options" class="max-h-60 overflow-y-auto p-2"></div>
              </div>
            </div>

            <button id="btn-add-member" onclick="addPickedMember()" class="mt-2 w-full py-2.5 rounded-xl bg-white border border-gray-200 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">Adicionar</button>
          </div>
        </div>

        <div class="flex gap-2 pt-1">
          <button id="btn-save-line" onclick="saveLine()" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-emerald-500 to-green-600 text-white font-bold text-sm shadow-lg shadow-emerald-200 hover:shadow-xl hover:shadow-emerald-200 transition-all active:scale-95">Salvar</button>
          <button id="btn-delete-line" onclick="deleteLine()" class="hidden flex-1 py-3 rounded-xl border border-red-200 text-red-600 font-bold text-sm hover:bg-red-50 transition-colors">Excluir</button>
        </div>
      </div>
    </div>
  </div>

  <div id="member-view-modal" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center hidden">
    <div class="fixed inset-0 bg-black/40" onclick="closeMemberView()"></div>
    <div class="relative bg-white w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl max-h-[90vh] overflow-y-auto shadow-2xl animate-in">
      <div class="sticky top-0 bg-white border-b border-gray-100 p-4 flex items-center justify-between rounded-t-2xl z-10">
        <h3 class="text-lg font-bold text-gray-900">Membro</h3>
        <button onclick="closeMemberView()" class="p-2 rounded-lg hover:bg-gray-100 transition-colors">
          <i data-lucide="x" class="w-5 h-5 text-gray-500"></i>
        </button>
      </div>
      <div id="member-view-body" class="p-4"></div>
    </div>
  </div>

<script type="module" src="./lines-secondary.js?v=cache-mod-20260529"></script>
  <script type="module" src="./lines.js"></script>
</body>
</html>
